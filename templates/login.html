<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Cyber Compliance Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{background:#0f172a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}</style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center text-2xl font-bold text-white mx-auto mb-4">CC</div>
      <h1 class="text-2xl font-bold text-white">Cyber Compliance Tracker</h1>
      <p class="text-slate-400 text-sm mt-2">Sign in to your account</p>
    </div>

    <div class="bg-slate-800 border border-slate-700 rounded-2xl p-8">
      <div id="error-box" class="hidden bg-red-900/40 border border-red-500/50 text-red-300 px-4 py-3 rounded-xl mb-5 text-sm"></div>

      <div class="space-y-5">
        <div>
          <label class="block text-slate-300 text-sm font-medium mb-2">Email Address</label>
          <input id="email" type="email" placeholder="you@company.com" required
            class="w-full bg-slate-700 border border-slate-600 text-white px-4 py-3 rounded-xl focus:outline-none focus:border-blue-500 transition-colors placeholder-slate-500"/>
        </div>
        <div>
          <label class="block text-slate-300 text-sm font-medium mb-2">Password</label>
          <input id="password" type="password" placeholder="••••••••" required
            class="w-full bg-slate-700 border border-slate-600 text-white px-4 py-3 rounded-xl focus:outline-none focus:border-blue-500 transition-colors placeholder-slate-500"/>
        </div>
        <button id="login-btn" onclick="handleLogin()"
          class="w-full bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-xl font-semibold transition-colors">
          Sign In
        </button>
      </div>
    </div>

    <p class="text-center text-slate-400 text-sm mt-6">
      Don't have an account? <a href="/register" class="text-blue-400 hover:text-blue-300 font-medium">Create one</a>
    </p>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('token')) { window.location.href = '/dashboard'; }

    // Allow Enter key to submit
    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

    async function handleLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('login-btn');
      const errorBox = document.getElementById('error-box');

      errorBox.classList.add('hidden');

      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      btn.textContent = 'Signing in...';
      btn.disabled = true;

      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) { showError(data.message || 'Login failed'); return; }

        localStorage.setItem('token', data.token);
        localStorage.setItem('user',  JSON.stringify(data.user));
        window.location.href = '/dashboard';
      } catch (err) {
        showError('Network error. Is the server running?');
      } finally {
        btn.textContent = 'Sign In';
        btn.disabled = false;
      }
    }

    function showError(msg) {
      const box = document.getElementById('error-box');
      box.textContent = msg;
      box.classList.remove('hidden');
    }
  </script>
</body>
</html>
