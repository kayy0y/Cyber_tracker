<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Cyber Compliance Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{background:#0f172a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}</style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center text-2xl font-bold text-white mx-auto mb-4">CC</div>
      <h1 class="text-2xl font-bold text-white">Create Account</h1>
      <p class="text-slate-400 text-sm mt-2">Join Cyber Compliance Tracker</p>
    </div>

    <div class="bg-slate-800 border border-slate-700 rounded-2xl p-8">
      <div id="error-box" class="hidden bg-red-900/40 border border-red-500/50 text-red-300 px-4 py-3 rounded-xl mb-5 text-sm"></div>

      <div class="space-y-5">
        <div>
          <label class="block text-slate-300 text-sm font-medium mb-2">Full Name</label>
          <input id="name" type="text" placeholder="John Doe"
            class="w-full bg-slate-700 border border-slate-600 text-white px-4 py-3 rounded-xl focus:outline-none focus:border-blue-500 transition-colors placeholder-slate-500"/>
        </div>
        <div>
          <label class="block text-slate-300 text-sm font-medium mb-2">Email Address</label>
          <input id="email" type="email" placeholder="you@company.com"
            class="w-full bg-slate-700 border border-slate-600 text-white px-4 py-3 rounded-xl focus:outline-none focus:border-blue-500 transition-colors placeholder-slate-500"/>
        </div>
        <div>
          <label class="block text-slate-300 text-sm font-medium mb-2">Password</label>
          <input id="password" type="password" placeholder="Min 6 characters"
            class="w-full bg-slate-700 border border-slate-600 text-white px-4 py-3 rounded-xl focus:outline-none focus:border-blue-500 transition-colors placeholder-slate-500"/>
        </div>
        <div>
          <label class="block text-slate-300 text-sm font-medium mb-2">Role</label>
          <select id="role"
            class="w-full bg-slate-700 border border-slate-600 text-white px-4 py-3 rounded-xl focus:outline-none focus:border-blue-500">
            <option value="user">User (Employee)</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <button id="reg-btn" onclick="handleRegister()"
          class="w-full bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-xl font-semibold transition-colors">
          Create Account
        </button>
      </div>
    </div>

    <p class="text-center text-slate-400 text-sm mt-6">
      Already have an account? <a href="/login" class="text-blue-400 hover:text-blue-300 font-medium">Sign in</a>
    </p>
  </div>

  <script>
    if (localStorage.getItem('token')) { window.location.href = '/dashboard'; }

    async function handleRegister() {
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const role     = document.getElementById('role').value;
      const btn      = document.getElementById('reg-btn');

      if (!name || !email || !password) { showError('All fields are required.'); return; }
      if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }

      btn.textContent = 'Creating account...';
      btn.disabled = true;

      try {
        const res  = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, role })
        });
        const data = await res.json();
        if (!res.ok) { showError(data.message || 'Registration failed'); return; }

        localStorage.setItem('token', data.token);
        localStorage.setItem('user',  JSON.stringify(data.user));
        window.location.href = '/dashboard';
      } catch (err) {
        showError('Network error. Is the server running?');
      } finally {
        btn.textContent = 'Create Account';
        btn.disabled = false;
      }
    }

    function showError(msg) {
      const box = document.getElementById('error-box');
      box.textContent = msg;
      box.classList.remove('hidden');
    }
  </script>
</body>
</html>
