{% extends "base.html" %}
{% block title %}Risks — CCT{% endblock %}
{% block page_title %}Risk Assessment{% endblock %}

{% block content %}
<div class="space-y-6">
  <div class="flex items-center justify-between">
    <p class="text-slate-400 text-sm" id="risk-summary">Loading...</p>
    <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2.5 rounded-xl text-sm font-medium transition-colors">
      + Add Risk
    </button>
  </div>
  <div id="risk-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
    <div class="col-span-3 text-center py-16 text-slate-400">Loading risks...</div>
  </div>
</div>

<!-- Modal -->
<div id="modal" class="modal-overlay">
  <div class="bg-slate-800 border border-slate-700 rounded-2xl p-8 w-full max-w-md mx-4 max-h-[92vh] overflow-y-auto">
    <h2 id="modal-title" class="text-white text-xl font-bold mb-6">Log New Risk</h2>
    <div id="modal-error" class="hidden bg-red-900/40 border border-red-500/50 text-red-300 px-4 py-3 rounded-xl mb-4 text-sm"></div>
    <div class="space-y-4">
      <div>
        <label class="text-slate-300 text-sm font-medium block mb-2">Risk Title *</label>
        <input id="r-title" placeholder="e.g. Weak password policy"
          class="w-full bg-slate-700 border border-slate-600 text-white px-4 py-3 rounded-xl focus:outline-none focus:border-blue-500"/>
      </div>
      <div>
        <label class="text-slate-300 text-sm font-medium block mb-2">Description</label>
        <textarea id="r-desc" rows="2" class="w-full bg-slate-700 border border-slate-600 text-white px-4 py-3 rounded-xl focus:outline-none focus:border-blue-500 resize-none"></textarea>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-slate-300 text-sm font-medium block mb-2">Severity</label>
          <select id="r-severity" class="w-full bg-slate-700 border border-slate-600 text-white px-4 py-3 rounded-xl focus:outline-none focus:border-blue-500">
            <option>Low</option><option selected>Medium</option><option>High</option><option>Critical</option>
          </select>
        </div>
        <div>
          <label class="text-slate-300 text-sm font-medium block mb-2">Likelihood: <span id="lik-label" class="text-blue-400">3/5</span></label>
          <input id="r-likelihood" type="range" min="1" max="5" value="3"
            oninput="document.getElementById('lik-label').textContent=this.value+'/5'"
            class="w-full mt-3 accent-blue-600"/>
        </div>
      </div>
      <div>
        <label class="text-slate-300 text-sm font-medium block mb-2">Impact</label>
        <input id="r-impact" placeholder="What is affected if this risk occurs?"
          class="w-full bg-slate-700 border border-slate-600 text-white px-4 py-3 rounded-xl focus:outline-none focus:border-blue-500"/>
      </div>
      <div>
        <label class="text-slate-300 text-sm font-medium block mb-2">Mitigation Plan</label>
        <textarea id="r-mitigation" rows="2" placeholder="How will this be addressed?"
          class="w-full bg-slate-700 border border-slate-600 text-white px-4 py-3 rounded-xl focus:outline-none focus:border-blue-500 resize-none"></textarea>
      </div>
      <div>
        <label class="text-slate-300 text-sm font-medium block mb-2">Status</label>
        <select id="r-status" class="w-full bg-slate-700 border border-slate-600 text-white px-4 py-3 rounded-xl focus:outline-none focus:border-blue-500">
          <option>Open</option><option>Mitigated</option><option>Closed</option>
        </select>
      </div>
      <div class="flex gap-3 pt-2">
        <button id="save-btn" onclick="saveRisk()" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-xl font-semibold transition-colors">Save</button>
        <button onclick="closeModal()" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-3 rounded-xl transition-colors">Cancel</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let editingId = null;
const SEV_CLS = {
  Low:      'bg-green-900/50 text-green-400 border border-green-700/50',
  Medium:   'bg-yellow-900/50 text-yellow-400 border border-yellow-700/50',
  High:     'bg-orange-900/50 text-orange-400 border border-orange-700/50',
  Critical: 'bg-red-900/50 text-red-400 border border-red-700/50',
};
const STA_CLS = {
  Open:      'bg-red-900/50 text-red-400',
  Mitigated: 'bg-yellow-900/50 text-yellow-400',
  Closed:    'bg-green-900/50 text-green-400',
};
function scoreColor(s) { return s>=16?'text-red-400':s>=9?'text-orange-400':s>=4?'text-yellow-400':'text-green-400'; }

async function loadRisks() {
  const risks = await api('GET', '/risks/');
  if (!risks) return;

  const open = risks.filter(r => r.status === 'Open').length;
  const crit = risks.filter(r => r.severity === 'Critical').length;
  document.getElementById('risk-summary').textContent = `${open} open · ${crit} critical`;

  const grid = document.getElementById('risk-grid');
  if (risks.length === 0) {
    grid.innerHTML = `<div class="col-span-3 text-center py-24 bg-slate-800 border border-slate-700 rounded-2xl">
      <p class="text-4xl mb-3">⚠️</p><p class="text-white font-medium">No risks logged yet</p>
      <p class="text-slate-400 text-sm mt-1">Start identifying cybersecurity risks.</p></div>`;
    return;
  }

  grid.innerHTML = risks.map(r => `
    <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 flex flex-col gap-4">
      <div class="flex items-start justify-between gap-2">
        <h3 class="text-white font-semibold text-sm flex-1">${escHtml(r.title)}</h3>
        <span class="text-xs px-2.5 py-1 rounded-full font-medium flex-shrink-0 ${SEV_CLS[r.severity]||''}">${r.severity}</span>
      </div>
      <p class="text-slate-400 text-sm">${escHtml(r.description || 'No description.')}</p>
      <div class="flex items-center gap-4 bg-slate-900/50 rounded-xl p-3">
        <div class="text-center flex-1">
          <p class="text-xl font-bold ${scoreColor(r.riskScore)}">${r.riskScore}</p>
          <p class="text-slate-500 text-xs">Risk Score</p>
        </div>
        <div class="w-px h-8 bg-slate-700"></div>
        <div class="text-center flex-1">
          <p class="text-white text-xl font-bold">${r.likelihood}<span class="text-slate-400 text-sm">/5</span></p>
          <p class="text-slate-500 text-xs">Likelihood</p>
        </div>
        <div class="w-px h-8 bg-slate-700"></div>
        <div class="text-center flex-1">
          <span class="text-xs px-2 py-1 rounded-full font-medium ${STA_CLS[r.status]||''}">${r.status}</span>
        </div>
      </div>
      ${r.mitigationPlan ? `<div class="bg-slate-900/40 rounded-xl p-3"><p class="text-slate-400 text-xs font-medium mb-1">Mitigation Plan</p><p class="text-slate-300 text-xs">${escHtml(r.mitigationPlan)}</p></div>` : ''}
      <div class="flex gap-2">
        <button onclick='editRisk(${JSON.stringify(r).replace(/'/g,"&#39;")})' class="flex-1 bg-slate-700 hover:bg-slate-600 text-white text-sm py-2 rounded-xl transition-colors">Edit</button>
        <button onclick="deleteRisk('${r.id}')" class="flex-1 bg-red-900/40 hover:bg-red-800/60 text-red-400 text-sm py-2 rounded-xl transition-colors">Delete</button>
      </div>
    </div>
  `).join('');
}

function openModal(r=null) {
  editingId = r ? r.id : null;
  document.getElementById('modal-title').textContent = r ? 'Edit Risk' : 'Log New Risk';
  document.getElementById('r-title').value      = r ? r.title          : '';
  document.getElementById('r-desc').value       = r ? r.description    : '';
  document.getElementById('r-severity').value   = r ? r.severity       : 'Medium';
  document.getElementById('r-likelihood').value = r ? r.likelihood     : 3;
  document.getElementById('lik-label').textContent = (r ? r.likelihood : 3) + '/5';
  document.getElementById('r-impact').value     = r ? r.impact         : '';
  document.getElementById('r-mitigation').value = r ? r.mitigationPlan : '';
  document.getElementById('r-status').value     = r ? r.status         : 'Open';
  document.getElementById('modal-error').classList.add('hidden');
  document.getElementById('modal').classList.add('open');
}

function editRisk(r) { openModal(r); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }

async function saveRisk() {
  const title = document.getElementById('r-title').value.trim();
  if (!title) { showErr('Title is required.'); return; }
  const btn = document.getElementById('save-btn');
  btn.textContent='Saving...'; btn.disabled=true;
  const body = {
    title, description: document.getElementById('r-desc').value,
    severity:    document.getElementById('r-severity').value,
    likelihood:  parseInt(document.getElementById('r-likelihood').value),
    impact:      document.getElementById('r-impact').value,
    mitigationPlan: document.getElementById('r-mitigation').value,
    status:      document.getElementById('r-status').value,
  };
  try {
    editingId ? await api('PUT', `/risks/${editingId}`, body) : await api('POST', '/risks/', body);
    closeModal(); loadRisks();
  } catch(err) { showErr(err.message); }
  finally { btn.textContent='Save'; btn.disabled=false; }
}

async function deleteRisk(id) {
  if (!confirm('Delete this risk?')) return;
  await api('DELETE', `/risks/${id}`); loadRisks();
}

function showErr(m) { const b=document.getElementById('modal-error'); b.textContent=m; b.classList.remove('hidden'); }
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

loadRisks();
</script>
{% endblock %}
